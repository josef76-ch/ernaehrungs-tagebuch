const PARSE_PROMPT=`Du bist ein Ernährungs-Parser. Extrahiere aus dem deutschen Text alle Mahlzeiten und Lebensmittel. Gib NUR valides JSON zurück, ohne Text davor/danach, ohne Markdown-Backticks.

Mahlzeiten-IDs: morgen, mittag, nachmittag, abend, abendsnack

Bekannte Lebensmittel (nutze exakt wenn genannt):
- Clear Whey: isFixed=true, amount=25, unit="g", kcal=84, carbs=3.2, protein=20, fat=0.5, fiber=0
- EAA/Impact EAA: isFixed=true, amount=9, unit="g", kcal=40, carbs=0, protein=9, fat=0, fiber=0
- ESN Riegel: isFixed=true, amount=45, unit="g", kcal=190, carbs=14, protein=14, fat=10, fiber=2
- Barebells: isFixed=true, amount=55, unit="g", kcal=203, carbs=14.9, protein=20.4, fat=8.3, fiber=2
- Maltodextrin: isFixed=false, per100={kcal:384,carbs:96,protein:0,fat:0,fiber:0}
- Boom Whey: isFixed=false, per100={kcal:366,carbs:9.1,protein:67.8,fat:6.7,fiber:0}
- Magerquark: isFixed=false, per100={kcal:68,carbs:5.1,protein:11.4,fat:0.3,fiber:0}
- Rindshuft: isFixed=false, per100={kcal:121,carbs:0,protein:21,fat:3.5,fiber:0}
- Teigwaren (trocken): isFixed=false, per100={kcal:370,carbs:74,protein:13,fat:1.5,fiber:3}
- Kaisergemüse: isFixed=false, per100={kcal:35,carbs:6,protein:2,fat:0.3,fiber:2.5}
- Hühnerbrust: isFixed=false, per100={kcal:120,carbs:0,protein:22,fat:2.6,fiber:0}
- Rindshuft: isFixed=false, per100={kcal:121,carbs:0,protein:21,fat:3.5,fiber:0}
- Haferflocken: isFixed=false, per100={kcal:372,carbs:58.7,protein:13.5,fat:7,fiber:10}

Regeln:
1. Gesamtwerte explizit angegeben (606 kcal, 55.9g KH...) → isFixed=true, unit="Portion"
2. Per-100g-Angaben mit Menge → isFixed=false, per100={...}, amount=Menge
3. Gesamtwerte für bestimmte Gramm-Menge (50g Philadelphia: 49kcal...) → isFixed=true, amount=50
4. "je eine Portion X am Morgen und Nachmittag" → beide Mahlzeiten befüllen
5. "können mit X aufgefüllt werden" → NICHT eintragen
6. Ballaststoffe / fiber: wenn angegeben, als fiber-Feld; sonst 0 setzen
7. Komma als Dezimaltrennzeichen → Punkt im JSON

JSON: {"meals":{"morgen":[...],"mittag":[...],"nachmittag":[...],"abend":[...],"abendsnack":[]}}
Item (fix): {"name":"...","amount":n,"unit":"g"/"Portion","isFixed":true,"kcal":n,"carbs":n,"protein":n,"fat":n,"fiber":n}
Item (skalierbar): {"name":"...","amount":n,"unit":"g","isFixed":false,"per100":{"kcal":n,"carbs":n,"protein":n,"fat":n,"fiber":n}}`;

function getMacros(item){
  if(item.isFixed||!item.per100)return{kcal:+(item.kcal||0),carbs:+(item.carbs||0),protein:+(item.protein||0),fat:+(item.fat||0),fiber:+(item.fiber||0)};
  const f=item.amount/100;
  return{kcal:Math.round((item.per100.kcal||0)*f),carbs:+((item.per100.carbs||0)*f).toFixed(1),protein:+((item.per100.protein||0)*f).toFixed(1),fat:+((item.per100.fat||0)*f).toFixed(1),fiber:+((item.per100.fiber||0)*f).toFixed(1)};
}
function sumArr(items){return items.reduce((a,i)=>{const m=getMacros(i);return{kcal:a.kcal+m.kcal,carbs:a.carbs+m.carbs,protein:a.protein+m.protein,fat:a.fat+m.fat,fiber:a.fiber+m.fiber};},{kcal:0,carbs:0,protein:0,fat:0,fiber:0});}
function pct(v,t){return Math.min(100,Math.round(v/t*100));}
function fmt1(n){return +(+n).toFixed(1);}
function todayStr(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('de-CH',{weekday:'short',day:'numeric',month:'short'});}
function shortDay(d){return new Date(d+'T12:00:00').toLocaleDateString('de-CH',{weekday:'short'}).replace('.','');}
function uid(){return Date.now()+Math.random();}

// ── SVG WEEK CHART ───────────────────────────────────────────────────────────
function WeekChart({wData,activeDate,onDateClick}){
  const VW=600,ML=42,MR=8,cW=VW-ML-MR;
  // Kcal section
  const cTop=16,cH=148;
  const maxKcal=Math.max(TARGETS.kcal*1.38,...wData.map(d=>d.kcal||0));
  const slot=cW/7,bw=Math.floor(slot*0.58);
  const bx=i=>ML+i*slot+(slot-bw)/2;
  const byT=v=>cTop+cH-Math.min(cH,Math.max(0,(v/maxKcal)*cH));
  const byH=v=>Math.min(cH,Math.max(2,(v/maxKcal)*cH));
  const tY=cTop+cH-(TARGETS.kcal/maxKcal)*cH;
  const dayLY=cTop+cH+16;
  // Macro section
  const macTop=dayLY+20,rowH=22,rowGap=7;
  const dayW=cW/7;
  const VH=macTop+10+(rowH+rowGap)*4+10;

  const bColor=d=>!d.hasData?'#1a2e1a':d.kcal>TARGETS.kcal*1.06?R:d.kcal>=TARGETS.kcal*0.86?G:B;
  const macros=[
    {key:'carbs',t:TARGETS.carbs,c:B,label:'KH'},
    {key:'protein',t:TARGETS.protein,c:G,label:'P'},
    {key:'fat',t:TARGETS.fat,c:O,label:'F'},
    {key:'fiber',t:TARGETS.fiber,c:V,label:'Balla'},
  ];

  return el('div',{style:{width:'100%',overflowX:'auto'}},
    el('svg',{viewBox:`0 0 ${VW} ${VH}`,style:{width:'100%',height:'auto',display:'block'}},

      // ── KCAL BARS ────────────────────────────────────────────────────────
      el('text',{x:ML,y:cTop-3,fill:'#3a5a3a',fontSize:9,fontFamily:'IBM Plex Mono,monospace',letterSpacing:'1.2'},'KALORIEN / TAG'),

      // Axis lines
      el('line',{x1:ML,y1:cTop+cH,x2:VW-MR,y2:cTop+cH,stroke:'#1a2e1a',strokeWidth:1}),
      el('line',{x1:ML,y1:cTop,x2:ML,y2:cTop+cH,stroke:'#1a2e1a',strokeWidth:1}),

      // Gridlines at 50% and 100%
      ...[0.5,1.0].map(f=>{
        const gy=cTop+cH-f*cH;
        return el('g',{key:'gl'+f},
          el('line',{x1:ML,y1:gy,x2:VW-MR,y2:gy,stroke:'#0e1c0e',strokeWidth:1,strokeDasharray:'3,4'}),
          el('text',{x:ML-4,y:gy+3.5,textAnchor:'end',fill:'#284028',fontSize:8,fontFamily:'IBM Plex Mono,monospace'},Math.round(maxKcal*f))
        );
      }),

      // Target line
      el('line',{x1:ML,y1:tY,x2:VW-MR,y2:tY,stroke:Y,strokeWidth:1.5,strokeDasharray:'5,3',opacity:0.75}),
      el('text',{x:VW-MR-2,y:tY-3,textAnchor:'end',fill:Y,fontSize:8,fontFamily:'IBM Plex Mono,monospace',opacity:0.85},'Ziel '+TARGETS.kcal+' kcal'),

      // Day bars
      ...wData.map((d,i)=>{
        const bc=bColor(d),bh2=d.hasData?byH(d.kcal):0,bt=d.hasData?byT(d.kcal):cTop+cH;
        const isActive=d.date===activeDate,isToday=d.date===todayStr();
        return el('g',{key:d.date,onClick:()=>onDateClick(d.date),style:{cursor:'pointer'}},
          isActive&&el('rect',{x:ML+i*slot,y:cTop,width:slot,height:cH,fill:'#ffffff',opacity:0.025}),
          // Bar
          el('rect',{x:bx(i),y:d.hasData?bt:cTop+cH-3,width:bw,height:d.hasData?bh2:3,fill:bc,rx:2.5,opacity:d.hasData?0.9:0.3}),
          // Value above bar
          d.hasData&&el('text',{x:bx(i)+bw/2,y:bt-4,textAnchor:'middle',fill:bc,fontSize:8.5,fontFamily:'IBM Plex Mono,monospace',fontWeight:'600'},Math.round(d.kcal)),
          // Day label
          el('text',{x:bx(i)+bw/2,y:dayLY,textAnchor:'middle',
            fill:isActive?G:isToday?'#6aaa6a':'#3a5a3a',
            fontSize:9,fontFamily:'IBM Plex Mono,monospace',
            fontWeight:isActive||isToday?'700':'400'
          },shortDay(d.date)+(isToday?' ◉':''))
        );
      }),

      // ── MACRO GRID ───────────────────────────────────────────────────────
      el('text',{x:ML,y:macTop+6,fill:'#3a5a3a',fontSize:9,fontFamily:'IBM Plex Mono,monospace',letterSpacing:'1.2'},'MAKROS VS. ZIEL'),

      // Legend dots
      ...macros.map((m,mi)=>el('g',{key:'leg'+mi},
        el('circle',{cx:ML+80+mi*62,cy:macTop+5,r:3.5,fill:m.c}),
        el('text',{x:ML+86+mi*62,y:macTop+9,fill:m.c,fontSize:8,fontFamily:'IBM Plex Mono,monospace'},m.label+' '+m.t+'g')
      )),

      ...macros.map((macro,mi)=>{
        const ry=macTop+18+mi*(rowH+rowGap);
        return el('g',{key:macro.key},
          // Row label
          el('text',{x:ML-4,y:ry+rowH/2+4,textAnchor:'end',fill:macro.c,fontSize:9,fontFamily:'IBM Plex Mono,monospace',fontWeight:'700'},macro.label),
          // Track background
          el('rect',{x:ML,y:ry,width:cW,height:rowH,fill:'#060d06',rx:3}),
          // Day dividers
          ...Array.from({length:6},(_,di)=>
            el('line',{key:'dv'+di,x1:ML+(di+1)*dayW,y1:ry+1,x2:ML+(di+1)*dayW,y2:ry+rowH-1,stroke:'#0c180c',strokeWidth:1})
          ),
          // Fill bars per day
          ...wData.map((d,i)=>{
            if(!d.hasData)return null;
            const val=d[macro.key]||0;
            const p=Math.min(1.08,val/macro.t);
            const fw=Math.max(3,(dayW*0.9)*p);
            const fx=ML+i*dayW+dayW*0.05;
            const col=val>macro.t?R:macro.c;
            const pctNum=Math.round(p*100);
            return el('g',{key:'mb'+i},
              el('rect',{x:fx,y:ry+3,width:fw,height:rowH-6,fill:col,rx:2,opacity:0.85}),
              pctNum>22&&el('text',{x:fx+fw/2,y:ry+rowH/2+3.5,textAnchor:'middle',fill:'#030b03',fontSize:7.5,fontFamily:'IBM Plex Mono,monospace',fontWeight:'700'},pctNum+'%')
            );
          }).filter(Boolean),
          // No-data indicators
          ...wData.map((d,i)=>
            !d.hasData?el('text',{key:'nd'+i,x:ML+i*dayW+dayW/2,y:ry+rowH/2+3.5,textAnchor:'middle',fill:'#1a2e1a',fontSize:8,fontFamily:'IBM Plex Mono,monospace'},'—'):null
          ).filter(Boolean)
        );
      })
    )
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [date,setDate]=useState(todayStr());
  const [diary,setDiary]=useState({});
  const [panel,setPanel]=useState(null);
  const [swapTarget,setSwapTarget]=useState(null);
  const [pending,setPending]=useState(null);
  const [pendingAmt,setPendingAmt]=useState(100);
  const [searchQ,setSearchQ]=useState('');
  const [searchRes,setSearchRes]=useState([]);
  const [searching,setSearching]=useState(false);
  const [view,setView]=useState('tag');
  const [planText,setPlanText]=useState('');
  const [parsing,setParsing]=useState(false);
  const [parseMsg,setParseMsg]=useState('');
  const [editAmt,setEditAmt]=useState(null);

  const day=()=>diary[date]||{};
  const mealItems=id=>(day()[id]||[]);
  const total=sumArr(MEALS.flatMap(m=>mealItems(m.id)));
  const updDiary=(mealId,fn)=>setDiary(p=>{const d=p[date]||{};return{...p,[date]:{...d,[mealId]:fn(d[mealId]||[])}};});
  const addItem=(mealId,food,replaceId=null)=>{
    const item={...food,amount:food.isFixed?food.amount:pendingAmt,_id:uid()};
    updDiary(mealId,list=>replaceId?list.map(i=>i._id===replaceId?item:i):[...list,item]);
    setPending(null);setPanel(null);setSwapTarget(null);setSearchQ('');setSearchRes([]);
  };
  const removeItem=(mealId,_id)=>updDiary(mealId,list=>list.filter(i=>i._id!==_id));
  const updateAmt=(mealId,_id,v)=>{const a=Math.max(0.1,parseFloat(v)||1);updDiary(mealId,list=>list.map(i=>i._id===_id?{...i,amount:a}:i));};

  const doSearch=async()=>{
    if(!searchQ.trim()||searchQ.length<2)return;
    setSearching(true);setSearchRes([]);
    try{
      const r=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(searchQ)}&search_simple=1&action=process&json=1&page_size=10&fields=product_name,nutriments&lc=de`);
      const d=await r.json();
      const res=(d.products||[]).filter(p=>p.product_name&&p.nutriments?.['energy-kcal_100g']!=null).slice(0,8).map(p=>({
        name:p.product_name.slice(0,55),amount:100,unit:'g',isFixed:false,
        per100:{kcal:Math.round(p.nutriments['energy-kcal_100g']),carbs:+((p.nutriments['carbohydrates_100g']||0).toFixed(1)),protein:+((p.nutriments['proteins_100g']||0).toFixed(1)),fat:+((p.nutriments['fat_100g']||0).toFixed(1)),fiber:+((p.nutriments['fiber_100g']||0).toFixed(1))}
      }));
      setSearchRes(res.length?res:[{error:true,name:'Keine Treffer.'}]);
    }catch(e){setSearchRes([{error:true,name:'Verbindungsfehler.'}]);}
    setSearching(false);
  };

  const parsePlan=async()=>{
    if(!planText.trim()||parsing)return;
    setParsing(true);setParseMsg('KI analysiert...');
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,system:PARSE_PROMPT,messages:[{role:'user',content:planText}]})});
      const data=await resp.json();
      const text=data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(text);
      let count=0;
      setDiary(p=>{const ex=p[date]||{};const nd={...ex};
        for(const[mid,items]of Object.entries(parsed.meals||{})){
          if(items&&items.length){nd[mid]=[...(ex[mid]||[]),...items.map(it=>({...it,_id:uid()}))];count+=items.length;}
        }return{...p,[date]:nd};});

  function PlanPanel(){
    return el('div',{style:{background:'#070f07',border:`1px solid ${G}44`,borderRadius:8,padding:14,marginBottom:12}},
      el('div',{style:{...S.lbl,marginBottom:10}},'TAGESPLAN EINGEBEN — KI-PARSER'),
      el('div',{style:{fontSize:11.5,color:'#5a7a5a',marginBottom:10}},'Beschreibe deinen Tag auf Deutsch. Der KI-Parser erkennt Mengen, Kalorien, Makros und bekannte Lebensmittel automatisch.'),
      el('textarea',{rows:7,value:planText,onChange:e=>setPlanText(e.target.value),placeholder:'Beispiel:\nAm Mittag esse ich eine Portion Hack-Reis-Pfanne mit 606 kcal bei 55.9g KH, 38.3g Protein, 24.4g Fett. Dazu eine Portion Clear Whey.\nAm Abend: 200g Rindshuft, 50g Teigwaren (trocken), 200g Kaisergemüse, eine Portion Clear Whey und ein ESN Riegel.\nAm Morgen und Nachmittag je eine Portion EAA.'}),
      el('div',{style:{display:'flex',gap:8,marginTop:10,alignItems:'center',flexWrap:'wrap'}},
        el('button',{style:{background:parsing?'#1a2e1a':G,color:'#000',border:'none',borderRadius:5,padding:'8px 20px',fontWeight:700,fontSize:13,opacity:parsing?0.6:1},onClick:parsePlan,disabled:parsing},parsing?'Analysiere...':'🤖 Tagesplan analysieren'),
        el('button',{style:{background:'none',color:'#3a5a3a',border:'1px solid #2a3e2a',borderRadius:5,padding:'7px 12px',fontSize:12},onClick:()=>{setPanel(null);setPlanText('');setParseMsg('');}  },'Abbrechen'),
        parseMsg&&el('span',{style:{fontSize:12,color:parseMsg.startsWith('✓')?G:R,fontFamily:'IBM Plex Mono,monospace'}},parseMsg)));
  }

  const vBtn=(id,lbl)=>el('button',{
    style:{border:view===id?'none':'1px solid #2a3e2a',borderRadius:4,padding:'5px 14px',fontSize:11,fontWeight:600,letterSpacing:'0.06em',fontFamily:'IBM Plex Mono,monospace',background:view===id?G:'#111e11',color:view===id?'#000':'#6a8a6a'},
    onClick:()=>setView(id)},lbl);

  return el('div',{style:S.wrap},
    el('div',{style:{marginBottom:16}},
      el('div',{style:S.lbl},'ERNÄHRUNGS//TAGEBUCH'),
      el('div',{style:{fontSize:20,fontWeight:700,color:'#f8fafc',letterSpacing:'-0.01em',marginTop:2}},'Tracking Dashboard v3.0')),
    el('div',{style:S.topRow},
      el('div',{style:{display:'flex',alignItems:'center',gap:6}},
        el('button',{style:S.navBtn,onClick:()=>navDate(-1)},'←'),
        el('input',{type:'date',value:date,onChange:e=>setDate(e.target.value),style:{background:'#0d1a0d',border:'1px solid #2a3e2a',color:'#e2e8f0',borderRadius:5,padding:'5px 9px',fontSize:13}}),
        el('button',{style:S.navBtn,onClick:()=>navDate(1)},'→'),
        date!==todayStr()&&el('button',{style:{background:'#111e11',color:G,border:`1px solid ${G}55`,borderRadius:5,padding:'5px 10px',fontSize:11},onClick:()=>setDate(todayStr())},'Heute')),
      el('div',{style:{display:'flex',gap:6}},
        el('button',{style:{background:panel==='plan'?Y:'#111500',color:panel==='plan'?'#000':Y,border:`1px solid ${Y}55`,borderRadius:5,padding:'5px 12px',fontSize:12,fontWeight:700},
          onClick:()=>{setPanel(panel==='plan'?null:'plan');setSwapTarget(null);setPending(null);}
        },'📝 Tagesplan'),
        vBtn('tag','TAG'),vBtn('woche','WOCHE'))),
    panel==='plan'&&el(PlanPanel),
    view==='tag'
      ?el('div',null,MEALS.map(m=>el(MealSection,{key:m.id,meal:m})),el(DaySummary))
      :el(WeekView));
}

ReactDOM.render(el(App),document.getElementById('root'));
</script>
</body>
</html>
